<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文章搜索 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="academic-search">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="page active" id="academicSearchPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      <div class="back-btn" onclick="location.href='academic.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="search-input-wrap" style="flex:1;margin:0 12px 0 0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="academicSearchInput" placeholder="搜索文章标题或摘要" onkeydown="if(event.key==='Enter')goAcademicSearch()" autofocus>
      </div>
      <span style="font-size:14px;color:var(--primary);white-space:nowrap;cursor:pointer;" onclick="goAcademicSearch()">搜索</span>
    </div>

    <div class="academic-search-page">
      <div class="academic-search-hint" id="academicSearchHint"></div>
      <div class="academic-list" id="academicSearchList"></div>
    </div>
  </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
