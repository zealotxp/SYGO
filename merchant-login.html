<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商家登录 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="merchant-login">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="page active" id="merchantLoginPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      商家登录
    </div>

    <div class="login-header">
      <div class="login-logo">商</div>
      <div class="login-title">商家中心</div>
      <div class="login-subtitle">上药GO · 商家后台</div>
    </div>

    <div class="login-card">
      <input class="login-phone-input" type="tel" placeholder="请输入商家手机号" id="merchantLoginPhone" maxlength="11">
      <input class="login-phone-input" type="password" placeholder="请输入登录密码" id="merchantLoginPwd" style="margin-top:10px;">
      <button class="btn-primary" style="margin-top:16px;width:100%;height:44px;border-radius:22px;" onclick="doMerchantLogin()">登录</button>
      <div class="login-privacy">
        登录即代表同意 <a href="javascript:void(0)" onclick="showUserAgreement()">《用户协议》</a> 和 <a href="javascript:void(0)" onclick="showPrivacy()">《隐私政策》</a>
      </div>
    </div>
  </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
