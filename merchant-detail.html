<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商家详情 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="merchant-detail">
<div class="app-container" id="app">
<div class="modal-overlay" id="qrModal">
    <div class="qr-modal-content">
      <div style="font-size:16px;font-weight:700;">企业微信咨询</div>
      <div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/></svg>
        <span>长按添加企业微信</span>
      </div>
      <div class="qr-tip">长按识别二维码，添加客服企业微信</div>
      <div style="margin-top:16px;">
        <button class="modal-btn modal-btn-secondary" onclick="closeQR()" style="width:100%;height:38px;border-radius:19px;">关闭</button>
      </div>
    </div>
  </div>

  <!-- ========== Success Modal ========== -->
<div class="toast" id="toast"></div>
<div class="modal-overlay image-preview-overlay" id="imagePreviewModal" onclick="closeImagePreview()">
  <img class="image-preview-img" id="imagePreviewImg" src="" alt="预览大图" onclick="event.stopPropagation()">
</div>
<div class="page active" id="merchantDetailPage">
    <div class="nav-bar" style="background:transparent;position:absolute;top:0;left:0;right:0;z-index:100;">
      <div class="back-btn" onclick="goBack()" style="background:rgba(0,0,0,0.3);">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
    </div>

    <div class="merchant-detail-hero">🏥</div>

    <div class="merchant-detail-card slide-up">
      <div class="merchant-detail-name">
        仁济诊所(浦东店) <span class="cert-badge">✓ 执业资质</span>
      </div>
      <div class="merchant-detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>浦东新区张杨路500号</span>
        <a href="javascript:void(0)" style="margin-left:auto;" onclick="navigateTo()">导航</a>
      </div>
      <div class="merchant-detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <a href="javascript:void(0)" onclick="callMerchant()">021-5888-XXXX</a>
      </div>
      <div class="merchant-detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>营业时间：08:30 - 21:30</span>
      </div>
      <div class="merchant-detail-actions">
        <button class="action-btn action-btn-nav" onclick="navigateTo()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          一键导航
        </button>
        <button class="action-btn action-btn-call" onclick="callMerchant()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          拨打电话
        </button>
        <button class="action-btn action-btn-chat" onclick="showQR()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          在线咨询
        </button>
      </div>
    </div>

    <div class="merchant-cert-section">
      <div class="drug-info-title">资质证书</div>
      <div class="cert-images">
        <div class="cert-img" onclick="previewCert(1)">📄</div>
        <div class="cert-img" onclick="previewCert(2)">📋</div>
      </div>
    </div>

    <div class="nearby-merchant-section" style="margin:10px 16px;border-radius:var(--radius);">
      <div class="drug-info-title">在售药品</div>
      <div class="nearby-merchant-item" onclick="goDrugDetail(1)">
        <div class="nearby-merchant-avatar"><img src="images/drug1.jpg" alt=""></div>
        <div class="nearby-merchant-info">
          <div class="nearby-merchant-name">静注人免疫球蛋白(pH4)</div>
          <div class="nearby-merchant-addr">武汉中原瑞德 · 2.5g/50ml</div>
        </div>
        <div class="nearby-merchant-right">
          <div class="nearby-merchant-stock">有货</div>
        </div>
      </div>
      <div class="nearby-merchant-item" onclick="goDrugDetail(3)">
        <div class="nearby-merchant-avatar"><img src="images/drug3.jpg" alt=""></div>
        <div class="nearby-merchant-info">
          <div class="nearby-merchant-name">人血白蛋白</div>
          <div class="nearby-merchant-addr">瑞士杰特贝林 · 10g(20% 50ml)</div>
        </div>
        <div class="nearby-merchant-right">
          <div class="nearby-merchant-stock">有货</div>
        </div>
      </div>
      <div class="nearby-merchant-item" onclick="goDrugDetail(5)">
        <div class="nearby-merchant-avatar"><img src="images/drug5.jpg" alt=""></div>
        <div class="nearby-merchant-info">
          <div class="nearby-merchant-name">人血白蛋白</div>
          <div class="nearby-merchant-addr">四川远大蜀阳 · 10g(20% 50ml)</div>
        </div>
        <div class="nearby-merchant-right">
          <div class="nearby-merchant-stock" style="color:var(--orange);">库存紧张</div>
        </div>
      </div>
    </div>
  </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
