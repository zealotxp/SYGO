<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="search">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="search-results-page" id="searchPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);">
      <div class="search-input-wrap" style="flex:1;margin:0 12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜索药品名称、厂家、商家" id="searchInput" oninput="handleSearch()">
        <svg class="clear-btn" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" onclick="clearSearch()"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <span style="font-size:14px;color:var(--primary);margin-right:12px;cursor:pointer;white-space:nowrap;" onclick="cancelSearch()">取消</span>
    </div>
    <div id="searchResults">
      <div class="search-result-section">
        <div class="search-result-section-title">热门搜索</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <span class="merchant-tag" onclick="searchFor('人血白蛋白')" style="cursor:pointer;">人血白蛋白</span>
          <span class="merchant-tag" onclick="searchFor('静注人免疫球蛋白')" style="cursor:pointer;">静注人免疫球蛋白</span>
          <span class="merchant-tag" onclick="searchFor('免疫球蛋白')" style="cursor:pointer;">免疫球蛋白</span>
          <span class="merchant-tag" onclick="searchFor('白蛋白')" style="cursor:pointer;">白蛋白</span>
          <span class="merchant-tag" onclick="searchFor('血液制品')" style="cursor:pointer;">血液制品</span>
        </div>
      </div>
      <div class="search-result-section">
        <div class="search-result-section-title">搜索历史</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <span class="merchant-tag" onclick="searchFor('人血白蛋白')" style="cursor:pointer;">人血白蛋白</span>
          <span class="merchant-tag" onclick="searchFor('杰特贝林')" style="cursor:pointer;">杰特贝林</span>
        </div>
      </div>
    </div>
    <div id="searchResultList" style="display:none;padding:12px 16px;"></div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item active" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>搜索</span>
    </div>
    <div class="tab-item" onclick="goMyAppointments()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>预约</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
