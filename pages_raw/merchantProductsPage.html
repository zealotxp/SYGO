<div class="page" id="merchantProductsPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      商品管理
    </div>

    <div class="m-prod-search-wrap">
      <input class="m-prod-search" id="merchantProductSearch" placeholder="搜索药品名称 / 规格" oninput="searchMerchantProduct()">
    </div>
    <div class="m-prod-cat-tabs" id="merchantCategoryTabs"></div>

    <div class="appointment-list" id="merchantProductList" style="margin-top:4px;"></div>

    <div class="merchant-batch-bar" id="merchantBatchBar" style="display:none;">
      <span>已选 <b id="merchantBatchCount">0</b> 项</span>
      <div>
        <button class="btn-batch on" onclick="merchantBatchOn()">批量上架</button>
        <button class="btn-batch off" onclick="merchantBatchOff()">批量下架</button>
      </div>
    </div>

    <div class="m-price-modal-mask" id="merchantPriceMask" onclick="if(event.target===this)closeMerchantPriceModal()">
      <div class="m-price-modal">
        <div class="m-price-modal-title">调整售价</div>
        <div class="m-price-modal-name" id="mpmName"></div>
        <div class="m-price-modal-row"><span>当前售价</span><b id="mpmCurrent"></b></div>
        <div class="m-price-modal-row"><span>平台最低限价</span><b class="m-price-limit" id="mpmMin"></b></div>
        <input class="m-price-modal-input" id="mpmInput" type="number" placeholder="请输入新售价">
        <div class="m-price-modal-tip" id="mpmTip"></div>
        <div class="m-price-modal-btns">
          <button class="m-price-btn cancel" onclick="closeMerchantPriceModal()">取消</button>
          <button class="m-price-btn ok" id="mpmOk" onclick="confirmMerchantPrice()">确定</button>
        </div>
      </div>
    </div>
  </div>
