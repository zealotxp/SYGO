<div class="page active" id="homePage">
    <!-- Status + Search -->
    <div class="search-bar">
      <div class="search-input-wrap" onclick="goSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜索药品名称、厂家、商家" readonly style="cursor:pointer;">
      </div>
    </div>

    <!-- Location -->
    <div class="location-bar" id="locationBar">
      <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span class="loc-text" id="locText" onclick="showLocationModal()">定位中...</span>
      <div class="loc-actions">
        <button class="loc-btn" onclick="refreshLocation()">🔄 刷新</button>
        <button class="loc-btn" onclick="showMapPicker()">📍 手动</button>
      </div>
    </div>

    <!-- Swiper -->
    <div class="swiper-section">
      <div class="swiper-wrap">
        <div class="swiper-track" id="swiperTrack">
          <div class="swiper-slide">
            <img src="images/banner1.png" alt="便民找药">
            <div class="swiper-slide-text">便民找药 一键查询<small>附近诊所药品实时查</small></div>
          </div>
          <div class="swiper-slide">
            <img src="images/banner2.png" alt="在线预约">
            <div class="swiper-slide-text">在线预约 到店取药<small>省时省心更便捷</small></div>
          </div>
          <div class="swiper-slide">
            <img src="images/banner3.png" alt="专业保障">
            <div class="swiper-slide-text">血液制品 专业保障<small>正规资质·品质放心</small></div>
          </div>
        </div>
        <div class="swiper-dots" id="swiperDots">
          <div class="swiper-dot active"></div>
          <div class="swiper-dot"></div>
          <div class="swiper-dot"></div>
        </div>
      </div>
    </div>

    <!-- Hot Drugs -->
    <div class="section-header">
      <div class="section-title">主推药品</div>
      <div class="section-more" onclick="goAllDrugs()">查看更多 ›</div>
    </div>
    <div class="featured-tabs" id="featuredTabs"></div>
    <div class="drug-grid" id="featuredDrugGrid"></div>

    <!-- Nearby Merchants -->
    <div class="section-header">
      <div class="section-title">附近商家</div>
      <div class="section-more" onclick="goAllMerchants()">查看更多 ›</div>
    </div>
    <div class="merchant-list">
      <div class="merchant-card" onclick="goMerchantDetail(1)">
        <div class="merchant-card-top">
          <div class="merchant-card-img">🏥</div>
          <div class="merchant-card-info">
            <div class="merchant-card-name">仁济诊所(浦东店) <span class="cert-badge">✓ 执业资质</span></div>
            <div class="merchant-card-addr">📍 浦东新区张杨路500号</div>
            <div class="merchant-card-distance">距您 580m</div>
          </div>
        </div>
        <div class="merchant-card-tags">
          <span class="merchant-tag">静注人免疫球蛋白</span>
          <span class="merchant-tag">人血白蛋白</span>
        </div>
      </div>
      <div class="merchant-card" onclick="goMerchantDetail(2)">
        <div class="merchant-card-top">
          <div class="merchant-card-img" style="background:var(--primary-light);">🏪</div>
          <div class="merchant-card-info">
            <div class="merchant-card-name">国大诊所(徐汇店) <span class="cert-badge">✓ 执业资质</span></div>
            <div class="merchant-card-addr">📍 徐汇区漕溪北路200号</div>
            <div class="merchant-card-distance">距您 1.2km</div>
          </div>
        </div>
        <div class="merchant-card-tags">
          <span class="merchant-tag">人血白蛋白</span>
          <span class="merchant-tag">静注人免疫球蛋白</span>
        </div>
      </div>
      <div class="merchant-card" onclick="goMerchantDetail(3)">
        <div class="merchant-card-top">
          <div class="merchant-card-img" style="background:#E8F0FE;">🏥</div>
          <div class="merchant-card-info">
            <div class="merchant-card-name">益丰诊所(静安店) <span class="cert-badge">✓ 执业资质</span></div>
            <div class="merchant-card-addr">📍 静安区南京西路1200号</div>
            <div class="merchant-card-distance">距您 2.1km</div>
          </div>
        </div>
        <div class="merchant-card-tags">
          <span class="merchant-tag">人血白蛋白</span>
          <span class="merchant-tag">静注人免疫球蛋白</span>
        </div>
      </div>
    </div>
    <div class="loading-more">— 更多商家敬请期待 —</div>
  </div>
