<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="profile">
<div class="app-container" id="app">
<div class="modal-overlay" id="qrModal">
    <div class="qr-modal-content">
      <div style="font-size:16px;font-weight:700;">企业微信咨询</div>
      <div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/></svg>
        <span>长按添加企业微信</span>
      </div>
      <div class="qr-tip">长按识别二维码，添加客服企业微信</div>
      <div style="margin-top:16px;">
        <button class="modal-btn modal-btn-secondary" onclick="closeQR()" style="width:100%;height:38px;border-radius:19px;">关闭</button>
      </div>
    </div>
  </div>

  <!-- ========== Success Modal ========== -->
<div class="toast" id="toast"></div>
<div class="page active" id="profilePage">
    <div class="profile-header">
      <div class="profile-user">
        <div class="profile-avatar" onclick="changeAvatar()">👤</div>
        <div>
          <div class="profile-name" onclick="editName()">微信用户</div>
          <div class="profile-id">ID: 100238</div>
        </div>
      </div>
      <div class="profile-stats">
        <div class="profile-stat" onclick="goMyAppointments()" style="cursor:pointer;">
          <div class="profile-stat-num">1</div>
          <div class="profile-stat-label">待到店</div>
        </div>
        <div class="profile-stat" onclick="goMyAppointments()" style="cursor:pointer;">
          <div class="profile-stat-num">1</div>
          <div class="profile-stat-label">已核销</div>
        </div>
        <div class="profile-stat" onclick="goMyAppointments()" style="cursor:pointer;">
          <div class="profile-stat-num">1</div>
          <div class="profile-stat-label">已取消</div>
        </div>
      </div>
    </div>

    <div class="profile-menu">
      <div class="profile-menu-item" onclick="goMyAppointments()">
        <div class="profile-menu-icon" style="background:var(--primary-light);">📋</div>
        <div class="profile-menu-text">我的预约</div>
        <span class="profile-menu-badge">1</span>
        <span class="profile-menu-arrow">›</span>
      </div>
      <div class="profile-menu-item" onclick="showQR()">
        <div class="profile-menu-icon" style="background:#E8F0FE;">💬</div>
        <div class="profile-menu-text">在线客服</div>
        <span class="profile-menu-arrow">›</span>
      </div>
    </div>

    <div class="profile-menu-item2" style="margin-top:10px;">
      <div class="profile-menu-item" onclick="showAbout()">
        <div class="profile-menu-icon" style="background:var(--orange-light);">ℹ️</div>
        <div class="profile-menu-text">关于我们</div>
        <span class="profile-menu-arrow">›</span>
      </div>
      <div class="profile-menu-item" onclick="showPrivacy()">
        <div class="profile-menu-icon" style="background:#FCE8E8;">🔒</div>
        <div class="profile-menu-text">隐私政策</div>
        <span class="profile-menu-arrow">›</span>
      </div>
      <div class="profile-menu-item" onclick="showUserAgreement()">
        <div class="profile-menu-icon" style="background:#E8F0FE;">📋</div>
        <div class="profile-menu-text">用户协议</div>
        <span class="profile-menu-arrow">›</span>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>搜索</span>
    </div>
    <div class="tab-item" onclick="goMyAppointments()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>预约</span>
    </div>
    <div class="tab-item active" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
