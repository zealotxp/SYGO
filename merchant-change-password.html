<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>修改密码 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="merchant-change-password">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="page active" id="merchantChangePasswordPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      修改密码
    </div>

    <div class="cp-card">
      <div class="cp-field">
        <label>原密码</label>
        <input type="password" id="cpOld" placeholder="请输入原密码">
      </div>
      <div class="cp-field">
        <label>新密码</label>
        <input type="password" id="cpNew" placeholder="至少6位">
      </div>
      <div class="cp-field">
        <label>确认新密码</label>
        <input type="password" id="cpConfirm" placeholder="再次输入新密码">
      </div>
      <button class="btn-primary" style="margin-top:20px;width:100%;height:44px;border-radius:22px;" onclick="doChangeMerchantPassword()">保存</button>
    </div>
  </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
