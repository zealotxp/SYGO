<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的预约 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="my-appointments">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="page active" id="myAppointmentsPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      我的预约
    </div>

    <div class="order-filter">
      <label>下单日期</label>
      <div class="order-date-trigger" id="apptOrderTrigger" onclick="openApptDatePicker()">全部日期</div>
      <button class="btn-reset" onclick="resetApptOrderRange()">全部</button>
    </div>

    <div class="appointment-list" id="appointmentList" style="margin-top:12px;"></div>

    <div class="m-date-picker" id="apptDatePicker">
      <div class="m-date-mask" onclick="closeApptDatePicker()"></div>
      <div class="m-date-sheet">
        <div class="m-date-head">
          <span class="m-date-title">选择下单日期</span>
          <span class="m-date-close" onclick="closeApptDatePicker()">✕</span>
        </div>
        <div class="m-date-range">
          <div class="m-date-field" id="apptDateStartField" onclick="setApptDateTarget('start')">
            <span class="m-date-label">开始</span>
            <span class="m-date-val" id="apptDateStartVal">请选择</span>
          </div>
          <span class="m-date-sep">至</span>
          <div class="m-date-field" id="apptDateEndField" onclick="setApptDateTarget('end')">
            <span class="m-date-label">结束</span>
            <span class="m-date-val" id="apptDateEndVal">请选择</span>
          </div>
        </div>
        <div class="m-date-cal-head">
          <span class="m-date-nav" onclick="shiftApptMonth(-1)">‹</span>
          <span id="apptDateMonthLabel"></span>
          <span class="m-date-nav" onclick="shiftApptMonth(1)">›</span>
        </div>
        <div class="m-date-week">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="m-date-grid" id="apptDateGrid"></div>
        <div class="m-date-actions">
          <button class="m-date-reset" onclick="resetApptDateRange()">重置</button>
          <button class="m-date-confirm" onclick="confirmApptDateRange()">确定</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" onclick="switchTab('academic')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>学术</span>
    </div>
    <div class="tab-item" onclick="switchTab('ai')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 9.5a1.5 1.5 0 1 1 1.5 1.5M15 9.5a1.5 1.5 0 1 1 1.5 1.5"/><path d="M8 15c1 1.3 2.5 2 4 2s3-.7 4-2"/></svg>
      <span>AI</span>
    </div>
    <div class="tab-item active" onclick="goMyAppointments()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>预约</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
