<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的预约 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="my-appointments">
<div class="app-container" id="app">
<div class="modal-overlay" id="verifyModal">
    <div class="verify-modal-content">
      <div class="verify-icon">📍</div>
      <div class="verify-title">位置验证</div>
      <div class="verify-desc">系统正在验证您是否在商家范围内，请确保已开启位置权限并位于商家附近</div>
      <div class="verify-btns">
        <button class="modal-btn modal-btn-secondary" onclick="closeVerify()">取消</button>
        <button class="modal-btn modal-btn-primary" onclick="doVerify()">验证核销</button>
      </div>
    </div>
  </div>

  <!-- ========== Cancel Confirm Modal ========== -->
<div class="modal-overlay" id="cancelConfirmModal">
    <div class="modal-content">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">确认取消预约？</div>
      <div class="modal-desc">取消后不可恢复，如需该药品请重新预约</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-secondary" onclick="closeCancelModal()">再想想</button>
        <button class="modal-btn modal-btn-primary" onclick="doCancelAppointment()" style="background:var(--red);">确认取消</button>
      </div>
    </div>
  </div>

  <!-- Merchant Picker (bottom sheet) -->
<div class="toast" id="toast"></div>
<div class="page active" id="myAppointmentsPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      我的预约
    </div>

    <div class="filter-tabs">
      <div class="filter-tab active" onclick="filterAppointments(this,'all')">全部</div>
      <div class="filter-tab" onclick="filterAppointments(this,'pending')">待到店</div>
      <div class="filter-tab" onclick="filterAppointments(this,'arrived')">已到店</div>
      <div class="filter-tab" onclick="filterAppointments(this,'cancelled')">已取消</div>
    </div>

    <div class="appointment-list" style="margin-top:12px;">
      <div class="appointment-item" data-status="pending">
        <div class="appointment-item-header">
          <span class="appointment-order-no">单号：YY20260522001</span>
          <span class="appointment-status status-pending">待到店</span>
        </div>
        <div class="appointment-item-body">
          <div class="appointment-item-icon"><img src="images/drug1.jpg" alt=""></div>
          <div class="appointment-item-info">
            <div class="appointment-item-drug">静注人免疫球蛋白(pH4)</div>
            <div class="appointment-item-merchant">仁济诊所(浦东店)</div>
            <div class="appointment-item-time">📅 2026-05-23 14:00</div>
          </div>
        </div>
        <div class="appointment-item-actions">
          <button class="btn-sm btn-sm-cancel" onclick="cancelAppointment(this)">取消预约</button>
          <button class="btn-sm btn-sm-primary" onclick="verifyArrival()">标记到店</button>
        </div>
      </div>

      <div class="appointment-item" data-status="arrived">
        <div class="appointment-item-header">
          <span class="appointment-order-no">单号：YY20260521003</span>
          <span class="appointment-status status-arrived">已到店</span>
        </div>
        <div class="appointment-item-body">
          <div class="appointment-item-icon"><img src="images/drug3.jpg" alt=""></div>
          <div class="appointment-item-info">
            <div class="appointment-item-drug">人血白蛋白(安博灵)</div>
            <div class="appointment-item-merchant">国大诊所(徐汇店)</div>
            <div class="appointment-item-time">📅 2026-05-21 10:00</div>
          </div>
        </div>
        <div class="appointment-item-actions">
          <button class="btn-sm" onclick="goDrugDetail(3)">再次预约</button>
        </div>
      </div>

      <div class="appointment-item" data-status="cancelled">
        <div class="appointment-item-header">
          <span class="appointment-order-no">单号：YY20260519005</span>
          <span class="appointment-status status-cancelled">已取消</span>
        </div>
        <div class="appointment-item-body">
          <div class="appointment-item-icon"><img src="images/drug5.jpg" alt=""></div>
          <div class="appointment-item-info">
            <div class="appointment-item-drug">人血白蛋白(蜀阳)</div>
            <div class="appointment-item-merchant">益丰诊所(静安店)</div>
            <div class="appointment-item-time">📅 2026-05-19 15:00</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>搜索</span>
    </div>
    <div class="tab-item" onclick="goMyAppointments()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>预约</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
