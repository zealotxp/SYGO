<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>预约订单 - 上药GO</title>
<link rel="stylesheet" href="css/common.css">

</head>
<body data-page="merchant-orders">
<div class="app-container" id="app">
<div class="toast" id="toast"></div>
<div class="page active" id="merchantOrdersPage">
    <div class="nav-bar" style="background:var(--white);color:var(--text);position:sticky;top:0;z-index:100;">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      预约订单
    </div>

    <div class="m-prod-search-wrap">
      <input class="m-prod-search" id="merchantOrderSearch" placeholder="搜索姓名 / 手机号" oninput="searchMerchantOrder()">
    </div>

    <div class="order-filter">
      <label>预约日期</label>
      <div class="order-date-trigger" id="merchantOrderTrigger" onclick="openMerchantDatePicker()">全部日期</div>
      <button class="btn-reset" onclick="resetMerchantOrderRange()">全部</button>
    </div>

    <div class="appointment-list" id="merchantOrderList" style="margin-top:4px;"></div>

    <div class="m-date-picker" id="merchantDatePicker">
      <div class="m-date-mask" onclick="closeMerchantDatePicker()"></div>
      <div class="m-date-sheet">
        <div class="m-date-head">
          <span class="m-date-title">选择预约日期</span>
          <span class="m-date-close" onclick="closeMerchantDatePicker()">✕</span>
        </div>
        <div class="m-date-range">
          <div class="m-date-field" id="mDateStartField" onclick="setMerchantDateTarget('start')">
            <span class="m-date-label">开始</span>
            <span class="m-date-val" id="mDateStartVal">请选择</span>
          </div>
          <span class="m-date-sep">至</span>
          <div class="m-date-field" id="mDateEndField" onclick="setMerchantDateTarget('end')">
            <span class="m-date-label">结束</span>
            <span class="m-date-val" id="mDateEndVal">请选择</span>
          </div>
        </div>
        <div class="m-date-cal-head">
          <span class="m-date-nav" onclick="shiftMerchantMonth(-1)">‹</span>
          <span id="mDateMonthLabel"></span>
          <span class="m-date-nav" onclick="shiftMerchantMonth(1)">›</span>
        </div>
        <div class="m-date-week">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="m-date-grid" id="mDateGrid"></div>
        <div class="m-date-actions">
          <button class="m-date-reset" onclick="resetMerchantDateRange()">重置</button>
          <button class="m-date-confirm" onclick="confirmMerchantDateRange()">确定</button>
        </div>
      </div>
    </div>
  </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
